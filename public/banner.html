<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1584px;
  height: 396px;
  overflow: hidden;
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}
.banner {
  width: 1584px;
  height: 396px;
  background: linear-gradient(135deg, #0a0f1a 0%, #0d1b2a 30%, #1b2838 60%, #0a0f1a 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated grid */
.grid {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(46, 117, 182, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46, 117, 182, 0.07) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glowing orbs */
.orb1 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(46, 117, 182, 0.25) 0%, transparent 70%);
  top: -100px;
  left: 100px;
}
.orb2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(74, 158, 222, 0.15) 0%, transparent 70%);
  bottom: -80px;
  right: 200px;
}
.orb3 {
  position: absolute;
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124, 185, 232, 0.1) 0%, transparent 70%);
  top: 50px;
  right: 500px;
}

/* Chain links */
.chain {
  position: absolute;
  display: flex;
  gap: 8px;
  opacity: 0.12;
}
.chain-link {
  width: 40px;
  height: 20px;
  border: 2px solid #4a9ede;
  border-radius: 10px;
}
.chain1 { top: 60px; left: 80px; transform: rotate(-15deg); }
.chain2 { bottom: 80px; right: 120px; transform: rotate(10deg); }
.chain3 { top: 140px; right: 300px; transform: rotate(-5deg); opacity: 0.08; }

/* Hex pattern */
.hex {
  position: absolute;
  width: 50px;
  height: 50px;
  opacity: 0.06;
  border: 1.5px solid #4a9ede;
}
.hex1 { top: 40px; right: 150px; transform: rotate(30deg); }
.hex2 { bottom: 50px; left: 300px; transform: rotate(45deg); }
.hex3 { top: 100px; left: 600px; transform: rotate(15deg); width: 35px; height: 35px; }
.hex4 { bottom: 90px; right: 450px; transform: rotate(60deg); width: 45px; height: 45px; }

/* Dots pattern */
.dots {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(rgba(46, 117, 182, 0.15) 1px, transparent 1px);
  background-size: 30px 30px;
  opacity: 0.4;
}

/* Connection lines */
.line {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(46, 117, 182, 0.2), transparent);
}
.line1 { width: 300px; top: 120px; left: 50px; transform: rotate(-8deg); }
.line2 { width: 250px; bottom: 100px; right: 100px; transform: rotate(5deg); }
.line3 { width: 400px; top: 200px; left: 400px; transform: rotate(-3deg); }

/* Nodes */
.node {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(46, 117, 182, 0.4);
  box-shadow: 0 0 10px rgba(46, 117, 182, 0.3);
}
.node1 { top: 80px; left: 200px; }
.node2 { top: 150px; left: 500px; }
.node3 { bottom: 120px; left: 350px; }
.node4 { top: 100px; right: 400px; }
.node5 { bottom: 80px; right: 250px; }
.node6 { top: 200px; right: 600px; }
.node7 { bottom: 150px; left: 700px; }
.node8 { top: 60px; right: 200px; width: 4px; height: 4px; }
.node9 { bottom: 50px; left: 150px; width: 4px; height: 4px; }

/* Content */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  padding-right: 100px;
}
.tagline {
  font-size: 28px;
  font-weight: 700;
  color: rgba(241, 245, 249, 0.95);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.tagline span {
  background: linear-gradient(135deg, #4a9ede, #7cb9e8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  font-size: 15px;
  color: rgba(148, 163, 184, 0.8);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 400;
}

/* Bottom accent line */
.accent-line {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, #2E75B6, #4a9ede, #2E75B6, transparent);
}

/* Block shapes */
.block {
  position: absolute;
  border: 1px solid rgba(46, 117, 182, 0.08);
  background: rgba(46, 117, 182, 0.02);
}
.block1 { width: 80px; height: 80px; top: 30px; left: 50px; transform: rotate(45deg); }
.block2 { width: 60px; height: 60px; bottom: 40px; right: 80px; transform: rotate(30deg); }
.block3 { width: 100px; height: 100px; top: 80px; right: 120px; transform: rotate(15deg); border-radius: 8px; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="dots"></div>

  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>

  <div class="chain chain1">
    <div class="chain-link"></div>
    <div class="chain-link"></div>
    <div class="chain-link"></div>
  </div>
  <div class="chain chain2">
    <div class="chain-link"></div>
    <div class="chain-link"></div>
    <div class="chain-link"></div>
    <div class="chain-link"></div>
  </div>
  <div class="chain chain3">
    <div class="chain-link"></div>
    <div class="chain-link"></div>
  </div>

  <div class="hex hex1"></div>
  <div class="hex hex2"></div>
  <div class="hex hex3"></div>
  <div class="hex hex4"></div>

  <div class="line line1"></div>
  <div class="line line2"></div>
  <div class="line line3"></div>

  <div class="node node1"></div>
  <div class="node node2"></div>
  <div class="node node3"></div>
  <div class="node node4"></div>
  <div class="node node5"></div>
  <div class="node node6"></div>
  <div class="node node7"></div>
  <div class="node node8"></div>
  <div class="node node9"></div>

  <div class="block block1"></div>
  <div class="block block2"></div>
  <div class="block block3"></div>

  <div class="content">
    <div class="tagline"><span>Building the Future</span> of Web3</div>
    <div class="subtitle">DeFi &bull; Chain Abstraction &bull; Crypto x AI &bull; Community</div>
  </div>

  <div class="accent-line"></div>
</div>
</body>
</html>
